    </radialGradient>
  </defs>

  <!-- fundo escuro arredondado -->
  <rect x="0" y="0" width="1024" height="1024" rx="180" fill="url(#bg)"/>
  <!-- moldura hazard amarela -->
  <rect x="48" y="48" width="928" height="928" rx="132"

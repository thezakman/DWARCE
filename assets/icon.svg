<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <radialGradient id="bg" cx="50%" cy="34%" r="80%">
      <stop offset="0%" stop-color="#20242b"/><stop offset="55%" stop-color="#14161b"/><stop offset="100%" stop-color="#090a0c"/>
    </radialGradient>
    <linearGradient id="frame" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffd34d"/><stop offset="50%" stop-color="#f5b301"/><stop offset="100%" stop-color="#b98200"/>
    </linearGradient>
    <radialGradient id="led" cx="40%" cy="36%" r="70%">

  <rect x="78" y="78" width="868" height="868" rx="102"
        fill="none" stroke="#000" stroke-width="6" opacity="0.55"/>
  <!-- listras hazard nos cantos sup-esq / inf-dir -->
  <g opacity="0.9">
    <clipPath id="tl"><rect x="48" y="48" width="150" height="46" rx="8"/></clipPath>
    <clipPath id="br"><rect x="826" y="930" width="150" height="46" rx="8"/></clipPath>
  </g>

  <!-- glow vermelho atrás do número -->
  <ellipse cx="512" cy="520.0" rx="320" ry="472" fill="url(#glow)"/>

